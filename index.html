<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Un gestor de tareas con calendario que funciona en el navegador y guarda datos en localStorage."
    />
    <title>Calendario de Tareas Diarias</title>
  </head>
  <body class="bg-slate-50 text-slate-900 antialiased">
    <div id="app"></div>
    <div
      id="toast-root"
      class="fixed right-3 top-3 z-50 flex w-[calc(100%-1.5rem)] max-w-sm flex-col gap-3 sm:right-5 sm:top-5"
      aria-live="polite"
      aria-atomic="true"
    ></div>
    <div id="modal-root"></div>
    <div id="confirm-root"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
